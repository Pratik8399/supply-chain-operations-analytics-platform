name: pipeline-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Lean CI deps: Prophet excluded (heavy); the forecasting module's
      # tiered fallback keeps the harness identical. BigQuery stage skips
      # gracefully without GCP credentials.
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn scipy

      - name: Compile all modules
        run: python -m py_compile etl/*.py tests/*.py

      - name: Run full pipeline on dev sample
        run: |
          python etl/make_dev_sample.py
          python etl/pipeline_orchestration.py

      - name: Detection recall regression gate
        run: python tests/check_detection_recall.py
